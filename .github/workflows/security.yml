name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"

jobs:
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Run pip-audit
        shell: bash
        run: |
          echo "## Dependency Security Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          uv pip freeze > /tmp/requirements-frozen.txt
          # Ignore CVE-2025-53000 (nbconvert) - no fix available, documented in CHANGELOG.md
          # Ignore CVE-2026-0994 (protobuf) - no fix available in v6.33.4, required by orbax
          uvx pip-audit --requirement /tmp/requirements-frozen.txt --format markdown --ignore-vuln CVE-2025-53000 --ignore-vuln CVE-2026-0994 >> $GITHUB_STEP_SUMMARY 2>&1 || {
            EXIT_CODE=$?
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Vulnerabilities found!** See details above." >> $GITHUB_STEP_SUMMARY
            exit $EXIT_CODE
          }
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No known vulnerabilities found." >> $GITHUB_STEP_SUMMARY

      - name: Run pip-audit (JSON for artifacts)
        if: always()
        shell: bash
        run: |
          # Ignore CVE-2025-53000 (nbconvert) - no fix available
          # Ignore CVE-2026-0994 (protobuf) - no fix available
          uv pip freeze > /tmp/requirements-frozen.txt
          uvx pip-audit --requirement /tmp/requirements-frozen.txt --format json --ignore-vuln CVE-2025-53000 --ignore-vuln CVE-2026-0994 --output audit-report.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-report
          path: audit-report.json
          retention-days: 30
