name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.2.3)"
        required: true
        type: string

env:
  JAX_ENABLE_X64: "1"

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      pypi-version: ${{ steps.version.outputs.pypi-version }}
    steps:
      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "push" ]]; then
            VERSION="$REF_NAME"
          else
            VERSION="$INPUT_VERSION"
          fi

          echo "Release version: $VERSION"

          # Validate version format (vX.Y.Z only)
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            echo "Expected format: vX.Y.Z (pre-release tags not supported)"
            exit 1
          fi

          PYPI_VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "pypi-version=$PYPI_VERSION" >> $GITHUB_OUTPUT

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: validate
    permissions:
      contents: read
    env:
      # Limit pytest-xdist workers to prevent OOM (JAX per-worker memory
      # exceeds runner RAM with auto workers).
      PYTEST_XDIST_WORKERS: "2"
      # Override pyproject.toml addopts (-q conflicts with -v, hiding CI failures).
      PYTEST_ADDOPTS: "-ra --strict-markers --strict-config --durations=10"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: |
          uv run pytest tests/ \
            -v \
            -n "$PYTEST_XDIST_WORKERS" \
            -o "addopts=$PYTEST_ADDOPTS" \
            --tb=short \
            --maxfail=10 \
            --timeout=300 --timeout-method=thread \
            -m "not slow and not serial" \
            --cov=nlsq \
            --cov-report=term

      - name: Run serial tests
        run: |
          uv run pytest tests/ \
            -v \
            -o "addopts=$PYTEST_ADDOPTS" \
            --tb=short \
            --timeout=300 --timeout-method=thread \
            -m "serial and not slow" \
          || {
            echo "::warning::Serial tests failed on first attempt, retrying..."
            sleep 2
            uv run pytest tests/ \
              -v \
              -o "addopts=$PYTEST_ADDOPTS" \
              --tb=short \
              --timeout=300 --timeout-method=thread \
              -m "serial and not slow"
          }

      - name: Verify import
        run: uv run python -c "import nlsq; print('Version:', nlsq.__version__)"

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: uv build

      - name: Check distribution
        run: uvx twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, build]
    permissions:
      id-token: write
    environment: release
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Check if version exists on PyPI
        id: check-pypi
        env:
          PYPI_VERSION: ${{ needs.validate.outputs.pypi-version }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/nlsq/$PYPI_VERSION/json")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "version_exists=true" >> $GITHUB_OUTPUT
            echo "Version $PYPI_VERSION already exists on PyPI - skipping"
          else
            echo "version_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.check-pypi.outputs.version_exists == 'false'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          print-hash: true

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, publish-pypi]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Generate changelog
        id: changelog
        env:
          CURRENT_TAG: ${{ needs.validate.outputs.version }}
        run: |
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREVIOUS_TAG" ]; then
            CHANGELOG="Initial release"
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          DELIMITER=$(openssl rand -hex 16)
          echo "changelog<<${DELIMITER}" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "${DELIMITER}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          name: Release ${{ needs.validate.outputs.version }}
          body: |
            # Release ${{ needs.validate.outputs.version }}

            ## What's Changed
            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            ```bash
            pip install nlsq==${{ needs.validate.outputs.pypi-version }}
            ```

            ## Artifacts
            - Source distribution (.tar.gz)
            - Wheel distribution (.whl)
          files: dist/*
          draft: false
          prerelease: false

  announce:
    name: Post-Release
    runs-on: ubuntu-latest
    needs: [validate, github-release]
    permissions:
      contents: read
    if: always() && needs.github-release.result == 'success'
    steps:
      - name: Summary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PYPI_VERSION: ${{ needs.validate.outputs.pypi-version }}
        run: |
          echo "## Release $VERSION Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tests:** Passed" >> $GITHUB_STEP_SUMMARY
          echo "**PyPI:** Published" >> $GITHUB_STEP_SUMMARY
          echo "**GitHub:** Released" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install:** \`pip install nlsq==$PYPI_VERSION\`" >> $GITHUB_STEP_SUMMARY
