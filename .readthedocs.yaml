# ReadTheDocs configuration for NLSQ
# Updated: 2026-03-07
# Requires: Python 3.12+ (tested on 3.13), JAX 0.9.1, NumPy 2.4.2, SciPy 1.17.1
# All dependencies (including docs) are in pyproject.toml[dependencies]
#
# Documentation Quality: Zero warnings policy enforced (fail_on_warning: true)

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"  # Aligned with pyproject.toml requires-python >=3.12, tested on 3.13
  apt_packages:
    - graphviz
  jobs:
    pre_build:
      - echo "Building NLSQ documentation..."
      - echo "This build requires JAX 0.9.1, NumPy 2.4.2, SciPy 1.17.1"
    post_build:
      - echo "Documentation build complete"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: true  # Zero warnings policy - all warnings resolved (2025-10-31)
  builder: html

formats:
  - htmlzip

python:
  install:
    - method: pip
      path: .  # All deps (including docs) are in main dependencies
